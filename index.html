<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart AI Campus Helpdesk</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    .chat-container { width: 450px; height: 600px; background: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #007bff; color: white; padding: 18px; text-align: center; font-size: 1.2rem; font-weight: bold; }
    
    .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 0.95rem; }
    .bot-message { background: #f1f3f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user-message { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .input-area { display: flex; border-top: 1px solid #e0e0e0; padding: 10px; background: #fafafa; }
    input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 12px 18px; outline: none; font-size: 0.95rem; }
    button { background: #007bff; color: white; border: none; border-radius: 20px; padding: 0 20px; margin-left: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">🏫 Smart Campus Helpdesk</div>
  <div class="messages-box" id="chatBox">
    <div class="message bot-message">Hello! Welcome to the Smart Campus Helpdesk. How can I assist you today?</div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about campus facilities, classes..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const userText = inputField.value.trim();
    if (!userText) return;

    const chatBox = document.getElementById("chatBox");

    // Display user message
    const userDiv = document.createElement("div");
    userDiv.className = "message user-message";
    userDiv.innerText = userText;
    chatBox.appendChild(userDiv);
    
    inputField.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    // Display loading message
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "message bot-message";
    loadingDiv.innerText = "Typing...";
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      // Connect to your live Render API
      const response = await fetch("https://smart-ai-campus-helpdesk.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userText })
      });

      const data = await response.json();
      loadingDiv.innerText = data.response || "Sorry, I couldn't process that.";
    } catch (err) {
      loadingDiv.innerText = "Error connecting to the server. Please try again later.";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  }
</script>

</body>
</html>
