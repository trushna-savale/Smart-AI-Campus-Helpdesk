<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart AI Campus Helpdesk</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
    
    .chat-container { width: 100%; max-width: 500px; height: 700px; background: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
    
    .chat-header { background: #4f46e5; color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
    .chat-title { font-size: 1.05rem; font-weight: 600; }
    .header-btn { background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; margin-left: 4px; }
    .header-btn:hover { background: rgba(255, 255, 255, 0.3); }

    /* Suggestion Chips (Feature 1) */
    .chips-container { display: flex; gap: 6px; padding: 10px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
    .chip { background: #e0e7ff; color: #3730a3; border: none; padding: 6px 12px; border-radius: 16px; font-size: 0.78rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .chip:hover { background: #c7d2fe; }
    
    .messages-box { flex: 1; padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    .message { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
    .bot-message { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
    .user-message { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .input-area { display: flex; border-top: 1px solid #e5e7eb; padding: 12px; background: #ffffff; gap: 8px; }
    input { flex: 1; border: 1px solid #d1d5db; border-radius: 20px; padding: 10px 16px; outline: none; font-size: 0.9rem; }
    button.send-btn { background: #4f46e5; color: white; border: none; border-radius: 20px; padding: 0 18px; cursor: pointer; font-weight: 600; }
    
    /* Search Modal (Feature 2) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 20px; border-radius: 10px; width: 350px; text-align: center; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="chat-title">🏫 Campus Helpdesk</div>
    <div>
      <button class="header-btn" onclick="openModal()">🔍 Lookup</button>
      <button class="header-btn" onclick="clearChat()">🗑️ Clear</button>
    </div>
  </div>

  <!-- Feature 1: Quick Action Suggestion Chips -->
  <div class="chips-container">
    <button class="chip" onclick="sendChip('The fan in room 302 is not working')">💡 Fan Broken</button>
    <button class="chip" onclick="sendChip('Wi-Fi is disconnected in Library')">📶 Wi-Fi Issue</button>
    <button class="chip" onclick="sendChip('Need replacement for Lost ID Card')">🔑 Lost ID Card</button>
    <button class="chip" onclick="sendChip('Projector in Lab 2 is flicking')">🖥️ Projector</button>
  </div>

  <div class="messages-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about campus issues..." onkeypress="handleKeyPress(event)">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Feature 2: Ticket Search Modal -->
<div class="modal" id="ticketModal">
  <div class="modal-content">
    <h3>🔍 Lookup Ticket Status</h3>
    <input type="text" id="ticketSearchInput" placeholder="Enter Ticket ID (e.g., CMP-123456)" style="width: 100%; margin-bottom: 10px;">
    <button class="send-btn" onclick="searchTicket()" style="padding: 8px 16px;">Search</button>
    <button class="header-btn" style="background: #ef4444; padding: 8px 16px; margin-top: 5px;" onclick="closeModal()">Close</button>
    <div id="searchResult" style="margin-top: 15px; text-align: left; font-size: 0.85rem;"></div>
  </div>
</div>

<script>
  const API_URL = "https://smart-ai-campus-helpdesk.onrender.com";
  const DEFAULT_WELCOME = [{ sender: 'bot', text: 'Hello! Welcome to the Smart Campus Helpdesk. How can I assist you today?' }];

  window.onload = function() { loadChatHistory(); };

  function loadChatHistory() {
    const saved = localStorage.getItem('chatHistory');
    const messages = saved ? JSON.parse(saved) : DEFAULT_WELCOME;
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";
    messages.forEach(msg => appendMessageUI(msg.sender, msg.text));
  }

  function saveMessageToStorage(sender, text) {
    const saved = localStorage.getItem('chatHistory');
    const messages = saved ? JSON.parse(saved) : [];
    messages.push({ sender, text });
    localStorage.setItem('chatHistory', JSON.stringify(messages));
  }

  function appendMessageUI(sender, text) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function sendChip(text) {
    document.getElementById("userInput").value = text;
    sendMessage();
  }

  async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const userText = inputField.value.trim();
    if (!userText) return;

    appendMessageUI('user', userText);
    saveMessageToStorage('user', userText);
    inputField.value = "";

    const chatBox = document.getElementById("chatBox");
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "message bot-message";
    loadingDiv.innerText = "Typing...";
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const response = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userText })
      });

      const data = await response.json();
      const botReply = data.response || "Sorry, I couldn't process that.";
      
      chatBox.removeChild(loadingDiv);
      appendMessageUI('bot', botReply);
      saveMessageToStorage('bot', botReply);
    } catch (err) {
      chatBox.removeChild(loadingDiv);
      appendMessageUI('bot', "Error connecting to server.");
    }
  }

  function openModal() { document.getElementById("ticketModal").style.display = "flex"; }
  function closeModal() { document.getElementById("ticketModal").style.display = "none"; }

  async function searchTicket() {
    const ticketId = document.getElementById("ticketSearchInput").value.trim();
    const resultDiv = document.getElementById("searchResult");
    if (!ticketId) return;

    resultDiv.innerHTML = "Searching...";
    try {
      const res = await fetch(`${API_URL}/ticket/${ticketId}`);
      const data = await res.json();
      if (data.error) {
        resultDiv.innerHTML = `<span style="color:red;">${data.error}</span>`;
      } else {
        resultDiv.innerHTML = `
          <b>Ticket:</b> ${data.ticket_id}<br>
          <b>Status:</b> <span style="color:green;font-weight:bold;">${data.status}</span><br>
          <b>Category:</b> ${data.category}<br>
          <b>Submitted:</b> ${data.timestamp}
        `;
      }
    } catch (err) {
      resultDiv.innerHTML = "Error fetching ticket.";
    }
  }

  function clearChat() {
    localStorage.removeItem('chatHistory');
    loadChatHistory();
  }

  function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
</script>

</body>
</html>
