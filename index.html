<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart AI Campus Helpdesk</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
    
    .chat-container { width: 100%; max-width: 480px; height: 650px; background: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
    
    /* Clean Flexbox Header to prevent overlapping */
    .chat-header { background: #4f46e5; color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-title { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 6px; margin: 0; }
    .clear-btn { background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: background 0.2s; white-space: nowrap; }
    .clear-btn:hover { background: #dc2626; }
    
    .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    
    .message { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
    .bot-message { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
    .user-message { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .input-area { display: flex; border-top: 1px solid #e5e7eb; padding: 12px; background: #ffffff; gap: 8px; }
    input { flex: 1; border: 1px solid #d1d5db; border-radius: 20px; padding: 10px 16px; outline: none; font-size: 0.92rem; transition: border-color 0.2s; }
    input:focus { border-color: #4f46e5; }
    button.send-btn { background: #4f46e5; color: white; border: none; border-radius: 20px; padding: 0 18px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.2s; }
    button.send-btn:hover { background: #4338ca; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="chat-title">🏫 Smart Campus Helpdesk</div>
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
  </div>
  <div class="messages-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask about campus facilities, classes..." onkeypress="handleKeyPress(event)">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const DEFAULT_WELCOME = [{ sender: 'bot', text: 'Hello! Welcome to the Smart Campus Helpdesk. How can I assist you today?' }];

  window.onload = function() {
    loadChatHistory();
  };

  function loadChatHistory() {
    const saved = localStorage.getItem('chatHistory');
    const messages = saved ? JSON.parse(saved) : DEFAULT_WELCOME;
    
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";
    messages.forEach(msg => appendMessageUI(msg.sender, msg.text));
  }

  function saveMessageToStorage(sender, text) {
    const saved = localStorage.getItem('chatHistory');
    const messages = saved ? JSON.parse(saved) : [];
    messages.push({ sender, text });
    localStorage.setItem('chatHistory', JSON.stringify(messages));
  }

  function appendMessageUI(sender, text) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const userText = inputField.value.trim();
    if (!userText) return;

    appendMessageUI('user', userText);
    saveMessageToStorage('user', userText);
    
    inputField.value = "";

    const chatBox = document.getElementById("chatBox");
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "message bot-message";
    loadingDiv.innerText = "Typing...";
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const response = await fetch("https://smart-ai-campus-helpdesk.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userText })
      });

      const data = await response.json();
      const botReply = data.response || "Sorry, I couldn't process that.";
      
      chatBox.removeChild(loadingDiv);
      appendMessageUI('bot', botReply);
      saveMessageToStorage('bot', botReply);

    } catch (err) {
      chatBox.removeChild(loadingDiv);
      const errorMsg = "Error connecting to the server. Please try again later.";
      appendMessageUI('bot', errorMsg);
      saveMessageToStorage('bot', errorMsg);
    }
  }

  function clearChat() {
    localStorage.removeItem('chatHistory');
    loadChatHistory();
  }

  function handleKeyPress(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  }
</script>

</body>
</html>
