<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helpdesk Admin Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; margin: 0; padding: 25px; }
    h1 { margin-bottom: 20px; color: #1e293b; display: flex; align-items: center; gap: 10px; }
    
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .card { background: white; padding: 18px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card-title { font-size: 0.8rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
    .card-value { font-size: 1.6rem; font-weight: bold; color: #4f46e5; margin-top: 5px; }

    /* Feature 3: Advanced Search & Filter Controls */
    .filter-bar { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.88rem; outline: none; }
    .filter-bar input { flex: 1; min-width: 200px; }

    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn { background: #4f46e5; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 0.85rem; }
    .btn-green { background: #10b981; }

    table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.88rem; }
    th { background: #f8fafc; color: #475569; }
    select { padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1; }
    .attached-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; border: 1px solid #cbd5e1; }
  </style>
</head>
<body>

  <h1><i class="fa-solid fa-user-shield"></i> Campus Helpdesk Admin Dashboard</h1>

  <div class="metrics-grid">
    <div class="card"><div class="card-title">Total Tickets</div><div class="card-value" id="metricTotal">0</div></div>
    <div class="card"><div class="card-title">Open Tickets</div><div class="card-value" id="metricOpen" style="color:#ef4444;">0</div></div>
    <div class="card"><div class="card-title">Resolved</div><div class="card-value" id="metricResolved" style="color:#10b981;">0</div></div>
    <div class="card"><div class="card-title">Top Category</div><div class="card-value" id="metricCategory" style="font-size:1.1rem;">-</div></div>
  </div>

  <!-- Feature 3: Live Search & Category/Status Filters -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search by PRN, Ticket ID, or message..." onkeyup="filterTable()">
    
    <select id="statusFilter" onchange="filterTable()">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="In Progress">In Progress</option>
      <option value="Resolved">Resolved</option>
    </select>

    <select id="categoryFilter" onchange="filterTable()">
      <option value="">All Categories</option>
      <option value="Electrical">Electrical</option>
      <option value="IT Support">IT Support</option>
      <option value="Maintenance">Maintenance</option>
      <option value="General">General</option>
    </select>
  </div>

  <div class="action-bar">
    <h3>Registered Complaints</h3>
    <a href="https://smart-ai-campus-helpdesk.onrender.com/admin/export-csv" class="btn btn-green"><i class="fa-solid fa-file-csv"></i> Export to CSV</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>Ticket ID</th>
        <th>Student</th>
        <th>PRN</th>
        <th>Category</th>
        <th>Message</th>
        <th>Attachment</th>
        <th>Status</th>
        <th>Change Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

<script>
  const API_URL = "https://smart-ai-campus-helpdesk.onrender.com";
  const ADMIN_PASSWORD = "admin123";
  let allTickets = [];

  window.onload = function() {
    const inputPass = prompt("🔐 Admin Access Required:\nPlease enter the Admin Password:");
    if (inputPass !== ADMIN_PASSWORD) {
      alert("❌ Access Denied! Incorrect Password.");
      window.location.href = "index.html";
      return;
    }

    fetchAnalytics();
    fetchLogs();
  };

  async function fetchAnalytics() {
    try {
      const res = await fetch(`${API_URL}/admin/analytics`);
      const data = await res.json();
      document.getElementById("metricTotal").innerText = data.total_tickets;
      document.getElementById("metricOpen").innerText = data.open_tickets;
      document.getElementById("metricResolved").innerText = data.resolved_tickets;
      document.getElementById("metricCategory").innerText = data.top_category;
    } catch (err) {
      console.error(err);
    }
  }

  async function fetchLogs() {
    try {
      const res = await fetch(`${API_URL}/admin/logs`);
      const result = await res.json();
      allTickets = result.data;
      renderTable(allTickets);
    } catch (err) {
      console.error(err);
    }
  }

  function renderTable(tickets) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    tickets.forEach(ticket => {
      const row = document.createElement("tr");
      const imgHtml = ticket.image_data ? `<a href="${ticket.image_data}" target="_blank"><img src="${ticket.image_data}" class="attached-img"></a>` : 'None';

      row.innerHTML = `
        <td><b>${ticket.ticket_id || 'FAQ'}</b></td>
        <td>${ticket.student_name || 'Anonymous'}</td>
        <td>${ticket.prn || 'N/A'}</td>
        <td>${ticket.category}</td>
        <td>${ticket.user_message}</td>
        <td>${imgHtml}</td>
        <td><b>${ticket.status}</b></td>
        <td>
          <select onchange="updateStatus('${ticket.ticket_id}', this.value)">
            <option value="Open" ${ticket.status === 'Open' ? 'selected' : ''}>Open</option>
            <option value="In Progress" ${ticket.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
            <option value="Resolved" ${ticket.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
          </select>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  /* Feature 3: Live Filtering Algorithm */
  function filterTable() {
    const searchVal = document.getElementById("searchInput").value.toLowerCase();
    const statusVal = document.getElementById("statusFilter").value;
    const categoryVal = document.getElementById("categoryFilter").value;

    const filtered = allTickets.filter(t => {
      const matchesSearch = (t.prn || '').toLowerCase().includes(searchVal) || 
                            (t.ticket_id || '').toLowerCase().includes(searchVal) || 
                            (t.user_message || '').toLowerCase().includes(searchVal);
      const matchesStatus = statusVal === "" || t.status === statusVal;
      const matchesCategory = categoryVal === "" || t.category === categoryVal;

      return matchesSearch && matchesStatus && matchesCategory;
    });

    renderTable(filtered);
  }

  async function updateStatus(ticketId, newStatus) {
    await fetch(`${API_URL}/admin/update-status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticket_id: ticketId, status: newStatus })
    });
    fetchAnalytics();
  }
</script>

</body>
</html>
