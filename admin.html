<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helpdesk Admin Portal</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; margin: 0; padding: 25px; }
    h1 { margin-bottom: 20px; color: #1e293b; }
    
    /* Feature 5: Analytics Metric Cards */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .card { background: white; padding: 18px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card-title { font-size: 0.8rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
    .card-value { font-size: 1.6rem; font-weight: bold; color: #4f46e5; margin-top: 5px; }

    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn { background: #4f46e5; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 0.85rem; }
    .btn-green { background: #10b981; }

    table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.88rem; }
    th { background: #f8fafc; color: #475569; }
    select { padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1; }
  </style>
</head>
<body>

  <h1>📊 Helpdesk Admin Portal</h1>

  <!-- Feature 5: Analytics Metrics -->
  <div class="metrics-grid">
    <div class="card"><div class="card-title">Total Tickets</div><div class="card-value" id="metricTotal">0</div></div>
    <div class="card"><div class="card-title">Open Tickets</div><div class="card-value" id="metricOpen" style="color:#ef4444;">0</div></div>
    <div class="card"><div class="card-title">Resolved</div><div class="card-value" id="metricResolved" style="color:#10b981;">0</div></div>
    <div class="card"><div class="card-title">Top Category</div><div class="card-value" id="metricCategory" style="font-size:1.1rem;">-</div></div>
  </div>

  <div class="action-bar">
    <h3>All Complaint Tickets</h3>
    <!-- Feature 4: CSV Export -->
    <a href="https://smart-ai-campus-helpdesk.onrender.com/admin/export-csv" class="btn btn-green">📥 Export to CSV</a>
  </div>

  <!-- Feature 3: Styled Admin Table -->
  <table>
    <thead>
      <tr>
        <th>Ticket ID</th>
        <th>Timestamp</th>
        <th>Category</th>
        <th>User Message</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

<script>
  const API_URL = "https://smart-ai-campus-helpdesk.onrender.com";

  window.onload = function() {
    fetchAnalytics();
    fetchLogs();
  };

  async function fetchAnalytics() {
    const res = await fetch(`${API_URL}/admin/analytics`);
    const data = await res.json();
    document.getElementById("metricTotal").innerText = data.total_tickets;
    document.getElementById("metricOpen").innerText = data.open_tickets;
    document.getElementById("metricResolved").innerText = data.resolved_tickets;
    document.getElementById("metricCategory").innerText = data.top_category;
  }

  async function fetchLogs() {
    const res = await fetch(`${API_URL}/admin/logs`);
    const result = await res.json();
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    result.data.forEach(ticket => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><b>${ticket.ticket_id || '-'}</b></td>
        <td>${ticket.timestamp}</td>
        <td>${ticket.category}</td>
        <td>${ticket.user_message}</td>
        <td><b>${ticket.status}</b></td>
        <td>
          <select onchange="updateStatus('${ticket.ticket_id}', this.value)">
            <option value="Open" ${ticket.status === 'Open' ? 'selected' : ''}>Open</option>
            <option value="In Progress" ${ticket.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
            <option value="Resolved" ${ticket.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
          </select>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  async function updateStatus(ticketId, newStatus) {
    await fetch(`${API_URL}/admin/update-status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ticket_id: ticketId, status: newStatus })
    });
    fetchAnalytics();
  }
</script>

</body>
</html>
